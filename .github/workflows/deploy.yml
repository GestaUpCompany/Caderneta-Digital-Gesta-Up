name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Build PWA
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_BACKEND_URL: https://caderneta-digital-gesta-up.vercel.app
          VITE_SUPABASE_URL: https://nrwljcvhwbezmoummxbl.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yd2xqY3Zod2Jlem1vdW1teGJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjIyNDEsImV4cCI6MjA5MzI5ODI0MX0.-es-LlZ61AtLPjoORm2RHi5AviDoKdI5bV14rukTpww
          VITE_USE_SUPABASE: true
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist
          
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
